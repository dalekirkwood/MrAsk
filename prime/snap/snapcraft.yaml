name: mrask
title: MrAsk
base: core22
version: '1.0.4'
summary: AI-powered command line assistant
description: |
  MrAsk is an AI-powered command line assistant for Debian-based systems.
  
  Ask questions in natural language and get shell command suggestions
  via an interactive selectable list using fzf and OpenRouter AI.
  
  Features:
  - Natural language command queries
  - Interactive fzf-based selection
  - Command explanations and danger warnings
  - Command history with explanations
  - Configurable AI models via OpenRouter

license: CC-BY-NC-4.0
contact: dalekirkwood@gmail.com
source-code: https://github.com/dalekirkwood/MrAsk
issues: https://github.com/dalekirkwood/MrAsk/issues
website: https://github.com/dalekirkwood/MrAsk

grade: stable
confinement: strict

parts:
  mrask:
    plugin: dump
    source: .
    organize:
      ask-cli/usr/bin/ask: bin/mrask
    stage-packages:
      - jq
      - curl
      - fzf
      - bash
      - less
    build-packages:
      - jq
      - curl
      - fzf
      - bash

apps:
  mrask:
    command: bin/mrask
    plugs:
      - home
      - network
      - removable-media
    environment:
      ASK_SNAP_MODE: "1"
  ask:
    command: bin/mrask
    plugs:
      - home
      - network
      - removable-media
    environment:
      ASK_SNAP_MODE: "1"

hooks:
  configure:
    plugs:
      - home
